version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cottage-rent-frontend
    ports:
      - "3000:80"
    networks:
      - cottage-rent
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cottage-rent-backend
    ports:
      - "8000:8000"
    networks:
      - cottage-rent
    depends_on:
      - db

  db:
    image: mongo:latest
    container_name: cottage-rent-db
    ports:
      - "27017:27017"
    networks:
      - cottage-rent

networks:
  cottage-rent:
    driver: bridge
